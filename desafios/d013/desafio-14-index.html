<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 450px;
        }

        td, th {
            border: 1px solid #999;
            padding: 8px 14px;
            text-align: center;
        }

        /* Cabeçalho escuro */
        thead th {
            background-color: #555;
            color: white;
        }

        /* Coluna Área e Disciplinas no thead */
        th.area, th.disciplinas {
            background-color: #555;
            color: white;
        }

        /* Células de Exatas e Humanas (negrito, fundo branco) */
        td.grupo {
            font-weight: bold;
            background-color: #fff;
        }

        /* Linhas de Média de Exatas / Humanas */
        tr.media-row td {
            background-color: #666;
            color: white;
            font-weight: bold;
        }

        tr.media-row td.valor {
            background-color: #666;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" class="area">Área</th>
                <th rowspan="2" class="disciplinas">Disciplinas</th>
                <th colspan="2">Notas</th>
                <th rowspan="2">Média</th>
            </tr>
            <tr>
                <th>Nota 1</th>
                <th>Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <!-- Exatas -->
            <tr>
                <td rowspan="4" class="grupo">Exatas</td>
                <td>Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <!-- Média de Exatas -->
            <tr class="media-row">
                <td colspan="4">Média de Exatas</td>
                <td class="valor">0.0</td>
            </tr>
            <!-- Humanas -->
            <tr>
                <td rowspan="2" class="grupo">Humanas</td>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <!-- Média de Humanas -->
            <tr class="media-row">
                <td colspan="4">Média de Humanas</td>
                <td class="valor">0.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
