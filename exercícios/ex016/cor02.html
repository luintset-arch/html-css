<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient em CSS</title>
    <style>
            * { /* Configurações globais das CSS */
                height: 100%;

        body {
            background-image: linear-gradient(to right, #7D08E2, #D504E4, #FE01D8, #FE0770, #FDC100);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
 <h1>Testando Gradiente</h1>   
</body>
</html>
